name: Windows real-machine setup E2E

on:
  pull_request:
    paths:
      - setup_win.bat
      - compose.yaml
      - .github/workflows/windows-real-machine-e2e.yml
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

concurrency:
  group: windows-real-machine-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  windows-real-machine-setup:
    if: github.event_name != 'pull_request' || github.event.pull_request.user.login == 'nishio'
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 90
    env:
      DOCKER_BIN: C:\Program Files\Docker\Docker\resources\bin\docker.exe
    steps:
      - uses: actions/checkout@v4

      - name: Show Docker environment
        shell: cmd
        run: |
          "%DOCKER_BIN%" --version
          "%DOCKER_BIN%" compose version
          "%DOCKER_BIN%" info

      - name: Clean previous run
        shell: cmd
        run: |
          "%DOCKER_BIN%" compose down -v --remove-orphans || echo No previous compose stack to clean.

      - name: Run setup_win.bat
        shell: cmd
        run: |
          chcp 65001
          set "PATH=C:\Program Files\Docker\Docker\resources\bin;%PATH%"
          call setup_win.bat --non-interactive --openai-api-key sk-test --gemini-api-key AIza-test

      - name: Wait for services
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $targets = @(
            "http://localhost:4000",
            "http://localhost:3000",
            "http://localhost:8000/docs"
          )

          foreach ($target in $targets) {
            $deadline = (Get-Date).AddMinutes(10)
            do {
              try {
                Invoke-WebRequest $target -UseBasicParsing -TimeoutSec 5 | Out-Null
                Write-Host "$target is reachable"
                break
              } catch {
                Start-Sleep -Seconds 5
              }
            } while ((Get-Date) -lt $deadline)

            if ((Get-Date) -ge $deadline) {
              throw "$target did not become reachable"
            }
          }

      - name: Show compose state
        if: always()
        shell: cmd
        run: |
          "%DOCKER_BIN%" compose ps
          "%DOCKER_BIN%" compose logs --tail=100 api || echo No api logs.
          "%DOCKER_BIN%" compose logs --tail=100 admin || echo No admin logs.
          "%DOCKER_BIN%" compose logs --tail=100 public-viewer || echo No public-viewer logs.

      - name: Clean up
        if: always()
        shell: cmd
        run: '"%DOCKER_BIN%" compose down -v --remove-orphans || exit /b 0'
